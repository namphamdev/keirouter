name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci --quiet
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd backend
          go build -trimpath -ldflags="-s -w" -o ../keirouter ./cmd/keirouter

      - name: Package
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE="keirouter_${VERSION}_${MATRIX_GOOS}_${MATRIX_GOARCH}.tar.gz"
          mkdir -p dist/keirouter
          cp keirouter dist/keirouter/
          cp -R frontend/dist dist/keirouter/frontend/dist
          tar -czf "${ARCHIVE}" -C dist keirouter
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
        env:
          MATRIX_GOOS: ${{ matrix.goos }}
          MATRIX_GOARCH: ${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keirouter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt

      - name: Update Homebrew formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"

          # Read checksums
          DARWIN_ARM64=$(grep "darwin_arm64" artifacts/checksums.txt | awk '{print $1}')
          DARWIN_AMD64=$(grep "darwin_amd64" artifacts/checksums.txt | awk '{print $1}')
          LINUX_ARM64=$(grep "linux_arm64" artifacts/checksums.txt | awk '{print $1}')
          LINUX_AMD64=$(grep "linux_amd64" artifacts/checksums.txt | awk '{print $1}')

          # Update version
          sed -i "s|version \".*\"|version \"${VERSION#v}\"|" Formula/keirouter.rb

          # Update checksums (arm64 first to avoid matching wrong line)
          sed -i "s|keirouter_v.*darwin_arm64.tar.gz\"|keirouter_v${VERSION#v}_darwin_arm64.tar.gz\"|" Formula/keirouter.rb
          sed -i "0,/REPLACE_WITH_ACTUAL_SHA256/{s|REPLACE_WITH_ACTUAL_SHA256|${DARWIN_ARM64}|}" Formula/keirouter.rb

          sed -i "s|keirouter_v.*darwin_amd64.tar.gz\"|keirouter_v${VERSION#v}_darwin_amd64.tar.gz\"|" Formula/keirouter.rb
          sed -i "0,/REPLACE_WITH_ACTUAL_SHA256/{s|REPLACE_WITH_ACTUAL_SHA256|${DARWIN_AMD64}|}" Formula/keirouter.rb

          sed -i "s|keirouter_v.*linux_arm64.tar.gz\"|keirouter_v${VERSION#v}_linux_arm64.tar.gz\"|" Formula/keirouter.rb
          sed -i "0,/REPLACE_WITH_ACTUAL_SHA256/{s|REPLACE_WITH_ACTUAL_SHA256|${LINUX_ARM64}|}" Formula/keirouter.rb

          sed -i "s|keirouter_v.*linux_amd64.tar.gz\"|keirouter_v${VERSION#v}_linux_amd64.tar.gz\"|" Formula/keirouter.rb
          sed -i "0,/REPLACE_WITH_ACTUAL_SHA256/{s|REPLACE_WITH_ACTUAL_SHA256|${LINUX_AMD64}|}" Formula/keirouter.rb

          echo "Updated Formula/keirouter.rb to ${VERSION}"
          cat Formula/keirouter.rb

      - name: Commit updated formula
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update Homebrew formula for ${{ github.ref_name }}"
          file_pattern: Formula/keirouter.rb
